<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move js-rock-button"><img src="icons/rock-emoji.png" class="move-icon"></button>

    <button class="move js-paper-button"><img src="icons/paper-emoji.png" class="move-icon"></button>

    <button class="move js-scissors-button"><img src="icons/scissors-emoji.png" class="move-icon"></button>

    <p class="current show">
        Start &uarr;
    </p>
    <p class="choice">
         
    </p>
    <p class="score"></p>
    <button class="reset-button js-reset-button">Reset score</button>
    <button class="auto-play js-autoPlay-button">Auto Play</button>
   <script src="script.js"></script>

</body>
</html>
