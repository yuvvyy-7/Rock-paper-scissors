<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <p class="title">Rock Paper Scissors</p>

    <button class="move" onclick="playGame('rock');
    updateCurrent('rock');"><img src="icons/rock-emoji.png" class="move-icon"></button>

    <button class="move" onclick="playGame('paper');
    updateCurrent('paper');"><img src="icons/paper-emoji.png" class="move-icon"></button>

    <button class="move" onclick="playGame('scissors');
    updateCurrent('scissors');"><img src="icons/scissors-emoji.png" class="move-icon"></button>

    <p class="current show">
        Start &uarr;
    </p>
    <p class="choice">
         
    </p>
    <p class="score"></p>
    <button onclick="resetScore()">Reset score</button>
    
   <script src="script.js"></script>

</body>
</html>
